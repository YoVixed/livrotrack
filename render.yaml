# Render.yaml

# This file configures the deployment settings for Render

services:
  - type: web
    name: LivroTrack Backend
    env: python
    runtime: python 
    plan: free
    region: oregon
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8000
